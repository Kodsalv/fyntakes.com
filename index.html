<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual Theme Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      height:100vh;
      overflow:hidden;
      display:flex;
    }

    /* =========================
       SPLIT SCREEN
    ========================== */

    .split{
      width:50%;
      height:100vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    /* =========================
       LEFT - WHITE THEME
    ========================== */

    .light{
      background:#ffffff;
      color:#111111;
    }

    .light .background-grid{
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      animation:moveGrid 12s linear infinite;
    }

    .light .circle{
      border:1px solid rgba(0,0,0,0.08);
    }

    .light .status{
      border:1px solid #111;
      color:#111;
    }

    .light .subtitle{
      color:#555;
    }

    .light .input-group label{
      color:#666;
    }

    .light .input-group input{
      border:1px solid #dcdcdc;
      background:rgba(255,255,255,0.75);
      color:#111;
    }

    .light .input-group input:focus{
      border-color:#111;
    }

    .light .login-btn{
      background:#111;
      color:#fff;
    }

    .light .footer{
      color:#777;
    }

    /* =========================
       RIGHT - DARK THEME
    ========================== */

    .dark{
      background:#050505;
      color:#ffffff;
    }

    .dark .background-grid{
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size:40px 40px;
      animation:moveGrid 12s linear infinite;
    }

    .dark .circle{
      border:1px solid rgba(255,255,255,0.08);
    }

    .dark .status{
      border:1px solid #ffffff;
      color:#ffffff;
    }

    .dark .subtitle{
      color:#aaaaaa;
    }

    .dark .input-group label{
      color:#999;
    }

    .dark .input-group input{
      border:1px solid #333;
      background:rgba(255,255,255,0.03);
      color:#fff;
    }

    .dark .input-group input:focus{
      border-color:#fff;
    }

    .dark .login-btn{
      background:#ffffff;
      color:#111111;
    }

    .dark .footer{
      color:#888;
    }

    /* =========================
       SHARED ELEMENTS
    ========================== */

    @keyframes moveGrid{
      from{
        transform:translateY(0px);
      }
      to{
        transform:translateY(40px);
      }
    }

    .circle{
      position:absolute;
      border-radius:50%;
      animation:float 8s infinite ease-in-out;
    }

    .circle.one{
      width:220px;
      height:220px;
      top:-60px;
      left:-60px;
    }

    .circle.two{
      width:300px;
      height:300px;
      bottom:-120px;
      right:-120px;
      animation-delay:2s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(15px);
      }
    }

    .container{
      position:relative;
      z-index:2;
      width:100%;
      max-width:420px;
      padding:50px 40px;
      text-align:center;
    }

    .status{
      display:inline-block;
      padding:8px 18px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:3px;
      text-transform:uppercase;
      margin-bottom:28px;
      animation:pulse 2s infinite ease-in-out;
    }

    @keyframes pulse{
      0%,100%{
        opacity:1;
      }
      50%{
        opacity:0.45;
      }
    }

    h1{
      font-size:clamp(42px, 7vw, 72px);
      line-height:0.95;
      letter-spacing:-3px;
      margin-bottom:18px;
      font-weight:700;
    }

    .subtitle{
      font-size:16px;
      line-height:1.7;
      margin-bottom:40px;
    }

    .login-form{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .input-group{
      text-align:left;
    }

    .input-group label{
      display:block;
      font-size:11px;
      letter-spacing:2px;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .input-group input{
      width:100%;
      padding:16px 18px;
      font-size:15px;
      outline:none;
      transition:all 0.25s ease;
    }

    .login-btn{
      margin-top:10px;
      padding:16px;
      border:none;
      font-size:12px;
      letter-spacing:3px;
      text-transform:uppercase;
      cursor:pointer;
      transition:opacity 0.25s ease;
    }

    .login-btn:hover{
      opacity:0.85;
    }

    .footer{
      margin-top:36px;
      font-size:13px;
      letter-spacing:4px;
    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:900px){
      body{
        flex-direction:column;
      }

      .split{
        width:100%;
        height:100vh;
      }
    }

  </style>
</head>

<body>

  <!-- LEFT WHITE SIDE -->

  <section class="split light">

    <div class="background-grid"></div>

    <div class="circle one"></div>
    <div class="circle two"></div>

    <div class="container">

      <div class="status">Fyntakes</div>

      <h1>
        Web<br />
        Login
      </h1>

      <p class="subtitle">
        Enter your credentials to continue.<br />
        Authorized employee only.
      </p>

      <form class="login-form">

        <div class="input-group">
          <label>Employee ID</label>
          <input type="text" placeholder="Enter Employee ID" />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter Password" />
        </div>

        <button class="login-btn">
          Log In
        </button>

      </form>

      <div class="footer">
        RK • VD
      </div>

    </div>

  </section>

  <!-- RIGHT DARK SIDE -->

  <section class="split dark">

    <div class="background-grid"></div>

    <div class="circle one"></div>
    <div class="circle two"></div>

    <div class="container">

      <div class="status">Xenti</div>

      <h1>
        Dark<br />
        Access
      </h1>

      <p class="subtitle">
        Authenticate to enter the system.<br />
        Restricted secure environment.
      </p>

      <form class="login-form">

        <div class="input-group">
          <label>User Key</label>
          <input type="text" placeholder="Enter User Key" />
        </div>

        <div class="input-group">
          <label>Passcode</label>
          <input type="password" placeholder="Enter Passcode" />
        </div>

        <button class="login-btn">
          Enter
        </button>

      </form>

      <div class="footer">
        NIGHT • MODE
      </div>

    </div>

  </section>

</body>
</html>
