<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .background-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveGrid 12s linear infinite;
    }

    @keyframes moveGrid {
      from {
        transform: translateY(0px);
      }
      to {
        transform: translateY(40px);
      }
    }

    .container {
      text-align: center;
      z-index: 2;
      padding: 40px;
      max-width: 700px;
    }

    .status {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid #111;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.45;
      }
    }

    h1 {
      font-size: clamp(42px, 8vw, 90px);
      line-height: 1;
      letter-spacing: -3px;
      margin-bottom: 24px;
    }

    p {
      font-size: 18px;
      color: #444;
      line-height: 1.7;
    }

    .signature {
      margin-top: 40px;
      font-size: 14px;
      letter-spacing: 5px;
      color: #666;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.08);
      animation: float 8s infinite ease-in-out;
    }

    .circle.one {
      width: 220px;
      height: 220px;
      top: -60px;
      left: -60px;
    }

    .circle.two {
      width: 300px;
      height: 300px;
      bottom: -120px;
      right: -120px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(15px);
      }
    }
  </style>
</head>
<body>
  <div class="background-grid"></div>

  <div class="circle one"></div>
  <div class="circle two"></div>

  <div class="container">
    <div class="status">Temporarily Offline</div>

    <h1>
      Site Under<br />
      Maintenance
    </h1>

    <p>
      We're making a few upgrades behind the scenes.<br />
      RK and VD will be back online shortly.
    </p>

    <div class="signature">RK • VD</div>
  </div>
</body>
</html>
