<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated Grid */

    .background-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveGrid 12s linear infinite;
    }

    @keyframes moveGrid {
      from {
        transform: translateY(0px);
      }
      to {
        transform: translateY(40px);
      }
    }

    /* Floating Circles */

    .circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.08);
      animation: float 8s infinite ease-in-out;
    }

    .circle.one {
      width: 220px;
      height: 220px;
      top: -60px;
      left: -60px;
    }

    .circle.two {
      width: 300px;
      height: 300px;
      bottom: -120px;
      right: -120px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(15px);
      }
    }

    /* Main Container */

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 50px 40px;
      text-align: center;
    }

    .status {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid #111;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.45;
      }
    }

    h1 {
      font-size: clamp(42px, 7vw, 72px);
      line-height: 0.95;
      letter-spacing: -3px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 40px;
    }

    /* Form */

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-group {
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: #666;
    }

    .input-group input {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid #dcdcdc;
      background: rgba(255,255,255,0.75);
      font-size: 15px;
      outline: none;
      transition: all 0.25s ease;
    }

    .input-group input:focus {
      border-color: #111;
    }

    .login-btn {
      margin-top: 10px;
      padding: 16px;
      border: none;
      background: #111;
      color: #fff;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.25s ease;
    }

    .login-btn:hover {
      opacity: 0.85;
    }

    .footer {
      margin-top: 36px;
      font-size: 13px;
      letter-spacing: 4px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="background-grid"></div>

  <div class="circle one"></div>
  <div class="circle two"></div>

  <div class="container">

    <div class="status">Secure Access</div>

    <h1>
      Employee<br />
      Portal
    </h1>

    <p class="subtitle">
      Enter your credentials to continue.<br />
      Authorized employee only.
    </p>

    <form class="login-form">

      <div class="input-group">
        <label>Employee ID</label>
        <input type="text" placeholder="Enter Customer ID" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter Password" />
      </div>

      <button class="login-btn">
        Log In
      </button>

    </form>

    <div class="footer">
      RK • VD
    </div>

  </div>

</body>
</html>
